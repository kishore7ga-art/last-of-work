<div
  class="wrapper-inner"
  [mbAnimate]="mbAnimate"
  [mbAnimatePreview]="isPreviewMode"
  [attr.data-block-id]="block.id"
  [class.has-video-selected]="isSelected() && block.type === 'section' && block.props.videoBackground?.enabled">

  @if (isSelected()) {
    <div class="block-controls">
      <span class="toolbar-arrow"></span>
      <button cdkDragHandle class="icon-btn drag-handle" type="button" title="Drag">
        <lucide-icon name="grip-vertical" [size]="14"></lucide-icon>
      </button>
      <span class="block-type-label">{{ block.type }}</span>
      <div class="block-actions">
        <button class="icon-btn" type="button" (click)="duplicate($event)" title="Duplicate">
          <lucide-icon name="copy" [size]="13"></lucide-icon>
        </button>
        <button class="icon-btn delete-btn" type="button" (click)="delete($event)" title="Delete">
          <lucide-icon name="trash-2" [size]="13"></lucide-icon>
        </button>
      </div>
    </div>
  }

  <div class="block-content" [class.hidden-block]="block.hidden">
    <ng-content></ng-content>
  </div>

  @if (block.animation?.enabled) {
    <span class="anim-badge">✦</span>
  }
</div>
